name: CI

on:
  push:
  pull_request:

jobs:
  bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax
        run: bash -n install.sh audit.sh rollback.sh report.sh lib/*.sh modules/*.sh
      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck install.sh audit.sh rollback.sh report.sh lib/*.sh modules/*.sh || true

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: YAML lint
        run: |
          python3 -m pip install yamllint
          yamllint ansible .github || true
